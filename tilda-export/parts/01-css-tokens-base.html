<style id="malea-tilda-css-01-tokens-base">
@font-face {
  font-family: "Leotaro";
  src: url("https://events.malea-soundhealing.com/assets/fonts/Leotaro-Regular.otf") format("opentype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Circe";
  src: url("https://events.malea-soundhealing.com/assets/fonts/circe.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Circe";
  src: url("https://events.malea-soundhealing.com/assets/fonts/circe-light.ttf") format("truetype");
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}

:root {
  
  --bg-void: #040812;
  --bg-night: #071020;
  --bg-deep: #0A1326;
  --bg-blue-black: #050B18;
  --bg-main: #0A1220;  


  
  --ink: #F3EBDD;
  --ink-soft: rgba(243, 235, 221, .74);
  --ink-muted: rgba(243, 235, 221, .52);
  --ink-faint: rgba(243, 235, 221, .32);
  --ink-ghost: rgba(243, 235, 221, .12);

  
  --gold: #D8B76C;
  --gold-soft: rgba(216, 183, 108, .64);
  --gold-line: rgba(216, 183, 108, .28);
  --gold-faint: rgba(216, 183, 108, .12);

  
  --blue-mist: rgba(94, 141, 190, .14);
  --violet-mist: rgba(117, 91, 171, .10);

  
  --font-display: "Leotaro", "Cormorant Garamond", Georgia, serif;
  --font-body: "Circe", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-quote: "Cormorant Garamond", Georgia, serif;

  
  --fs-display: clamp(82px, 10vw, 152px);
  --fs-hero: clamp(64px, 8.6vw, 126px);
  --fs-section: clamp(36px, 4.2vw, 60px);
  --fs-title: clamp(28px, 3.4vw, 48px);
  --fs-subtitle: clamp(19px, 2vw, 28px);
  
  --fs-body: clamp(16px, 1.25vw, 18px);
  --fs-micro: clamp(10px, .78vw, 12px);

  
  --s-1: 8px;
  --s-2: 12px;
  --s-3: 16px;
  --s-4: 24px;
  --s-5: 32px;
  --s-6: 48px;
  --s-7: 72px;
  --s-8: 96px;
  --s-9: 128px;
  --s-10: 160px;

  
  --heading-kicker-gap: clamp(14px, 1.6vw, 24px);
  --heading-sub-gap: clamp(10px, 1.1vw, 16px);
  --heading-copy-gap: clamp(22px, 2.4vw, 36px);

  
  --vr-standard: clamp(100px, 12vh, 180px);
  --vr-dense: clamp(72px, 8vh, 120px);
  --vr-generous: clamp(140px, 16vh, 220px);
  --vr-transitional: clamp(60px, 6vh, 100px);

  
  --page-x: clamp(28px, 6vw, 128px);
  --content-max: 1360px;
  --content: min(calc(100vw - var(--page-x) * 2), var(--content-max));

  
  --ease-out: cubic-bezier(.16, 1, .3, 1);
  --ease-soft: cubic-bezier(.22, .61, .36, 1);
  --dur-slow: 1100ms;
  --dur-mid: 760ms;

  
  --z-nav: 80;
  --z-menu: 90;
  --z-modal: 100;
}





*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; padding: 0; }

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
  
  overflow-x: hidden;
}

body {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: var(--fs-body);
  line-height: 1.66;
  color: var(--ink);
  background: var(--bg-main);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

body.is-scroll-locked { overflow: hidden; }


.site-atmosphere {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 5%, rgba(243,235,221,.025) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 92%, rgba(94,141,190,.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg-void) 0%, var(--bg-main) 35%, var(--bg-main) 100%);
}

@media (max-width: 760px) {
  .site-atmosphere {
    position: absolute;
    background:
      radial-gradient(ellipse at 50% 5%, rgba(243,235,221,.015) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 92%, rgba(94,141,190,.04) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg-void) 0%, var(--bg-main) 35%, var(--bg-main) 100%);
  }
}

img { display: block; max-width: 100%; height: auto; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
ul, ol { list-style: none; }
::selection { background: var(--gold); color: var(--bg-void); }

h1, h2, h3, h4 { font-weight: 400; text-wrap: balance; }
p { text-wrap: pretty; }

:focus-visible { outline: 1px solid var(--gold-soft); outline-offset: 4px; }


.section {
  position: relative;
  width: 100%;
}

.wrap {
  position: relative;
  z-index: 1;
  width: var(--content);
  max-width: var(--content-max);
  margin-inline: auto;
}

.pad-block { padding-block: var(--vr-standard); }
.pad-block--dense { padding-block: var(--vr-dense); }
.pad-block--generous { padding-block: var(--vr-generous); }
.pad-block--transitional { padding-block: var(--vr-transitional); }
.full { min-height: 100svh; }


.overline {
  display: inline-flex;
  align-items: center;
  gap: var(--s-3);
  font-size: var(--fs-micro);
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--gold-soft);
  font-weight: 400;
}
.overline::before {
  content: "";
  width: clamp(28px, 4vw, 56px);
  height: 1px;
  background: var(--gold-line);
}
.overline--center::after {
  content: "";
  width: clamp(28px, 4vw, 56px);
  height: 1px;
  background: var(--gold-line);
}

.display {
  font-family: var(--font-display);
  font-size: var(--fs-display);
  line-height: .98;
  letter-spacing: .03em;
}
.heading {
  font-family: var(--font-display);
  font-size: var(--fs-section);
  line-height: 1.08;
  letter-spacing: .01em;
}
.overline + .heading,
.overline + .title {
  margin-top: var(--heading-kicker-gap);
}
.heading + .subtitle,
.title + .subtitle {
  margin-top: var(--heading-sub-gap);
}
.title {
  font-family: var(--font-display);
  font-size: var(--fs-title);
  line-height: 1.12;
}
.subtitle {
  font-size: var(--fs-subtitle);
  color: var(--ink-soft);
  font-weight: 300;
  line-height: 1.4;
}
.lede {
  font-size: var(--fs-body);
  color: var(--ink-soft);
  line-height: 1.7;
  max-width: 60ch;
}
.measure { max-width: 36rem; }

.rule {
  width: 100%;
  height: 1px;
  background: var(--gold-line);
  border: 0;
}
.rule--short { width: clamp(48px, 8vw, 120px); }


.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--s-3);
  padding: 1.05em 2.1em;
  font-family: var(--font-body);
  font-size: var(--fs-micro);
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink);
  border: 1px solid var(--gold-line);
  background: transparent;
  position: relative;
  overflow: hidden;
  isolation: isolate;
  transition:
    color       .45s var(--ease-soft),
    border-color .45s var(--ease-soft),
    box-shadow  .45s var(--ease-soft);
}
.btn::after {
  content: "";
  position: absolute;
  inset: -2px;
  background: radial-gradient(
    ellipse 120% 180% at 50% 130%,
    rgba(216, 183, 108, .22)  0%,
    rgba(216, 183, 108, .08)  40%,
    transparent               68%
  );
  opacity: 0;
  transform: scale(.55) translateY(8px);
  transform-origin: 50% 100%;
  transition:
    opacity   .5s var(--ease-soft),
    transform .65s var(--ease-out);
  pointer-events: none;
  z-index: 0;
}
.btn:hover {
  color: var(--gold);
  border-color: rgba(216, 183, 108, .52);
  box-shadow:
    0 0 0 1px rgba(216,183,108,.08),
    0 0 22px rgba(216,183,108,.10),
    inset 0 0 14px rgba(216,183,108,.04);
}
.btn:hover::after {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.btn--gold {
  border-color: var(--gold-soft);
  color: var(--gold);
}
.btn--gold::after {
  background: radial-gradient(
    ellipse 120% 180% at 50% 130%,
    rgba(216, 183, 108, .28)  0%,
    rgba(216, 183, 108, .10)  40%,
    transparent               68%
  );
}
.btn--gold:hover {
  border-color: var(--gold);
  box-shadow:
    0 0 0 1px rgba(216,183,108,.14),
    0 0 28px rgba(216,183,108,.16),
    inset 0 0 18px rgba(216,183,108,.06);
}
.btn span {
  position: relative;
  z-index: 1;
}

.link-arrow {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  font-size: var(--fs-micro);
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--gold-soft);
  transition: gap .4s var(--ease-soft), color .4s var(--ease-soft);
}
.link-arrow:hover { gap: var(--s-4); color: var(--gold); }


.aura {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
</style>
