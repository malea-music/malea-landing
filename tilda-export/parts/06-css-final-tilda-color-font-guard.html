:root {
  --op-dur: 1500ms;
  --op-ease: cubic-bezier(0.33, 0, 0.18, 1); 
}

@media (min-width: 1101px),
       (min-width: 1024px) and (max-width: 1366px) and (orientation: landscape) and (pointer: coarse),
       (orientation: portrait) and (min-width: 700px) and (max-width: 1024px) and (pointer: coarse),
       (max-width: 760px) and (pointer: coarse) {

  
  html.js-opening .opening-stage {
    display: block;
    position: relative;
    height: 100vh;
    height: 100lvh;
    overflow: hidden;
    z-index: 2;
  }

  
  html.js-opening #opening .op-layer {
    position: absolute;
    inset: 0;
    min-height: 0;
    height: 100%;
    overflow: hidden;
    transform-origin: 50% 58%;
    will-change: transform, opacity, filter;
    backface-visibility: hidden;
    
    opacity: 0;
    transform: scale(0.94) translateY(22px);
    filter: blur(4px);
  }

  
  html.js-opening #opening .op-layer::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0.58;            
    pointer-events: none;
    z-index: 6;               
    will-change: opacity;
    backface-visibility: hidden;
  }

  
  html.js-opening #opening .op-layer.is-current {
    opacity: 1;
    transform: none;
    filter: none;
    z-index: 4;
  }
  html.js-opening #opening .op-layer.is-current::after { opacity: 0; }

  
  html.js-opening #opening .op-layer.is-leaving {
    opacity: 0;
    transform: scale(1.014);
    filter: blur(1.2px);
    z-index: 3;
  }
  html.js-opening #opening .op-layer.is-leaving::after { opacity: 0.40; }

  
  html.js-opening.opening-anim #opening .op-layer {
    transition:
      transform var(--op-dur) var(--op-ease),
      opacity   var(--op-dur) var(--op-ease),
      filter    var(--op-dur) var(--op-ease);
  }
  html.js-opening.opening-anim #opening .op-layer::after {
    transition: opacity var(--op-dur) var(--op-ease);
  }

  
  html.js-opening #opening #identity.op-layer {
    display: grid;
    place-content: center;
    padding-block: 0;
  }

  
  html.js-opening #opening #identity.op-layer .identity__portrait {
    max-height: 76vh;
  }
}


@media ((max-width: 760px) and (pointer: coarse)),
       ((orientation: portrait) and (min-width: 700px) and (max-width: 1024px) and (pointer: coarse)) {
  html.js-opening .opening-stage {
    height: auto;
    min-height: 0;
    padding-top: 100vh;
    padding-top: 100lvh;
    padding-top: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
  }

  html.js-opening #opening #intro.op-layer,
  html.js-opening #opening #hero.op-layer {
    height: 100vh;
    height: 100lvh;
    height: 100dvh;
  }

  html.js-opening #opening #identity.op-layer {
    position: relative;
    inset: auto;
    display: block;
    height: auto;
    min-height: 0;
    overflow: visible;
    opacity: 1;
    transform: none;
    filter: none;
    z-index: 1;
    padding-block: var(--vr-standard);
  }

  html.js-opening #opening #identity.op-layer::after { display: none; }

  html.js-opening #opening #identity.op-layer .identity__inner {
    align-items: center;
  }
}


@media (prefers-reduced-motion: reduce) {
  .opening-stage { display: contents; }
}





@media (min-width: 1101px) {
  
  #philosophy {
    display: block;
    min-height: 0;
    padding-block: var(--vr-standard);
  }
  
  #philosophy .philo__inner {
    padding-block: 0;
  }

  
  .quote-screen {
    min-height: 0;
    padding-block: var(--vr-standard);
  }

  
  .quote-screen .bigquote[data-reveal] {
    transform: translateY(34px) scale(0.965);
    filter: blur(7px);
    transition:
      opacity   1150ms var(--op-ease),
      transform 1150ms var(--op-ease),
      filter    1150ms var(--op-ease);
    will-change: transform, opacity, filter;
  }
  .quote-screen .bigquote[data-reveal].is-in {
    transform: none;
    filter: none;
  }
}





@media (min-width: 1101px) {

  
  html.js-cinematic #philosophy [data-reveal] {
    opacity: 1 !important;
    transform: none !important;
    filter: none !important;
    transition: none !important;
  }
  html.js-cinematic #philosophy .philo__inner {
    opacity: 0;
    transform: translateY(32px) scale(0.97);
    filter: blur(6px);
    transform-origin: 50% 60%;
    transition:
      opacity   1200ms var(--op-ease),
      transform 1200ms var(--op-ease),
      filter    1200ms var(--op-ease);
    will-change: transform, opacity, filter;
  }
  html.js-cinematic #philosophy.op-appear .philo__inner {
    opacity: 1;
    transform: none;
    filter: none;
  }
}


@media (prefers-reduced-motion: reduce) {
  html.js-cinematic #philosophy .philo__inner {
    opacity: 1 !important;
    transform: none !important;
    filter: none !important;
  }
}
