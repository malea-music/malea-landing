[data-reveal] {
  opacity: 0;
  transform: translateY(28px);
  filter: blur(6px);
  transition:
    opacity var(--dur-slow) var(--ease-out),
    transform var(--dur-slow) var(--ease-out),
    filter var(--dur-slow) var(--ease-out);
  transition-delay: var(--reveal-delay, 0ms);
  will-change: opacity, transform;
}
[data-reveal].is-in {
  opacity: 1;
  transform: none;
  filter: blur(0);
}

[data-reveal="line"] {
  transform: scaleX(0);
  transform-origin: left;
  filter: none;
  transition: transform var(--dur-slow) var(--ease-out);
  transition-delay: var(--reveal-delay, 0ms);
}
[data-reveal="line"].is-in { transform: scaleX(1); }

[data-reveal="scale"] {
  opacity: 0;
  transform: scale(1.03);
  filter: blur(4px);
  transition:
    opacity var(--dur-slow) var(--ease-out),
    transform var(--dur-slow) var(--ease-out),
    filter var(--dur-slow) var(--ease-out);
  transition-delay: var(--reveal-delay, 0ms);
}
[data-reveal="scale"].is-in { opacity: 1; transform: scale(1); filter: blur(0); }


[data-reveal="depth-quote"] {
  opacity: 0;
  transform: perspective(980px) translate3d(0, 46px, -190px) rotateX(9deg) scale(.84);
  transform-origin: 50% 62%;
  filter: blur(18px) saturate(.78) brightness(.72);
  transition:
    opacity 1650ms var(--ease-out),
    transform 1650ms var(--ease-out),
    filter 1650ms var(--ease-out);
  transition-delay: var(--reveal-delay, 0ms);
  will-change: opacity, transform, filter;
  backface-visibility: hidden;
}
[data-reveal="depth-quote"].is-in {
  opacity: 1;
  transform: perspective(980px) translate3d(0, 0, 0) rotateX(0deg) scale(1);
  filter: blur(0) saturate(1) brightness(1);
}

[data-reveal="depth-quote"] .bigquote__text {

  transition: text-shadow 1900ms var(--ease-soft);

}
[data-reveal="depth-quote"].is-in .bigquote__text {
  text-shadow:

[data-reveal="depth-quote"] .bigquote__attr {

    transform 1300ms var(--ease-out);
  transition-delay: calc(var(--reveal-delay, 0ms) + 280ms);
}

  opacity: 1;
  transform: none;
}

@media (max-width: 1100px) {

@media (prefers-reduced-motion: reduce) {
