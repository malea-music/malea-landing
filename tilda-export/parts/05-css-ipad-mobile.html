<style id="malea-tilda-css-05-ipad-mobile">
/* ===== 10-ipadpro-portrait.css ===== */
/* =========================================================
   MALEA · 10 · iPad PORTRAIT compositions
   ---------------------------------------------------------
   Restores the DESKTOP paired (2-column) editorial compositions
   on portrait iPads, where the 08 layer had flattened them into
   weak single-column stacks (image floating over text, etc.).

   TWO bands:
   · 700–1024  — the 7 TEXT compositions (Identity, Live,
                 Performance, Art, Reviews, Egypt, Final). These
                 read as paired image|text / text|list units and
                 fit from iPad mini (744) up to iPad Pro 12.9 (1024).
   · 960–1024  — the wider 3-column grids (Musicians, Integration,
                 Why) + Philosophy 2-col + tightened heading gap;
                 these need real width, so iPad Pro 12.9 only.

   Phones (≤760) → layer 09.  Vertical rhythm for 761–959 → layer 11.
   Loaded after 08/09 → overrides their portrait stacking.

   ►  TO ROLL BACK: delete this file's <link> in index.html.

   Kept portrait-style on purpose: Hero (stacked), Player (stacked
   cards), Formats (compact 2-col), Portfolio (tight 3-col).
   ========================================================= */

/* =========================================================
   BAND 1 · Paired text compositions — ALL portrait iPads (700–1024)
   ========================================================= */
@media (orientation: portrait) and (min-width: 700px) and (max-width: 1024px) {

  /* ===== 03 · IDENTITY → photo | (title + sub + list) ===== */
  .identity__inner { grid-template-columns: 44fr 56fr; gap: clamp(32px, 4vw, 72px); align-items: center; }
  .identity__portrait { width: auto; max-width: none; margin-inline: 0; }

  /* ===== 05 · LIVE → lede | divider | formats list ===== */
  .live-text-inner {
    grid-template-columns: minmax(0, 48%) 1px minmax(0, 52%);
    grid-template-rows: auto auto;
    row-gap: 0;
    align-items: start;
  }
  .live__heading { text-align: left; }
  .live-text-left  { grid-column: 1; grid-row: 1; padding-right: clamp(28px, 3.5vw, 56px); text-align: left; }
  .live__text      { margin-inline: 0; }
  .live-text-line  { display: block; grid-column: 2; grid-row: 1 / 3; }
  .live-text-right { grid-column: 3; grid-row: 1 / 3; padding-left: clamp(28px, 3.5vw, 56px); }
  .live-formats-label {
    font-family: var(--font-body);
    font-size: var(--fs-subtitle);
    font-weight: 300;
    text-align: left;
    margin-bottom: clamp(14px, 2vh, 24px);
  }
  .live-formats { display: flex; flex-direction: column; }
  .live-format-row { border-top: none; border-bottom: 1px solid rgba(216,183,108,.10); }
  .live-format-row:first-child { border-top: 1px solid rgba(216,183,108,.10); }
  .live-text-btn { grid-column: 1; grid-row: 2; align-self: end; text-align: left; }

  /* ===== 08 · PERFORMANCE → title+sub | text ===== */
  #performance .shead { grid-template-columns: 1fr 1fr; column-gap: clamp(24px, 3.5vw, 64px); }
  #performance .shead::before { display: block; }
  #performance .shead .shead__title { grid-column: 1; grid-row: 1; margin-top: 0; }
  #performance .shead .shead__sub   { grid-column: 1; grid-row: 2; max-width: none; }
  #performance .shead .shead__text  { grid-column: 2; grid-row: 1 / -1; align-self: start; max-width: 44ch; margin-top: 0; padding-left: clamp(14px, 2vw, 28px); }

  /* ===== 09 · ART → title+sub | text ===== */
  #art .shead { grid-template-columns: 1fr 1fr; column-gap: clamp(24px, 3.5vw, 64px); }
  #art .shead::before { display: block; }
  #art .shead .shead__title { grid-column: 1; grid-row: 1; margin-top: 0; }
  #art .shead .shead__sub   { grid-column: 1; grid-row: 2; max-width: none; }
  #art .shead .shead__text  { grid-column: 2; grid-row: 1 / -1; align-self: start; max-width: 44ch; margin-top: 0; padding-left: clamp(14px, 2vw, 28px); }

  /* ===== 11 · REVIEWS → full-width stack.
     The states list is TALLER than the heading text, so beside it it would
     collide with the carousel on a portrait canvas. Stack: heading →
     full-width states list → carousel. Dropping the half-column cap also
     fixes the original "content stuck in the left half" look — the list now
     spans the full width and lines up with the carousel below. ===== */
  #reviews .shead { grid-template-columns: 1fr; }
  #reviews .shead .shead__title,
  #reviews .shead .shead__sub,
  #reviews .shead .shead__text { grid-column: auto; grid-row: auto; }
  .rev__states { position: static; left: auto; right: auto; top: auto; grid-column: auto; grid-row: auto; margin-top: clamp(28px, 4vh, 48px); max-width: none; }
  /* Short state labels look sparse in one full-width column → 2-column matrix
     (with the 6th state shown, that's a clean 3×2). */
  .rev__states-list { grid-template-columns: 1fr 1fr; column-gap: clamp(28px, 4vw, 64px); }

  /* ===== 12 · EGYPT → video | text + timeline (centred section title) ===== */
  .egypt__header { text-align: center; }
  .egypt__grid {
    grid-template-columns: minmax(260px, 40%) minmax(0, 1fr);
    gap: clamp(28px, 4vw, 72px);
    align-items: stretch;
  }
  .egypt-video-preview {
    height: 100%;
    aspect-ratio: auto;
    min-height: clamp(400px, 38vh, 560px);
    max-height: none;
  }
  .egypt-video-preview__media { background-position: center; }
  .egypt__body { display: flex; flex-direction: column; }

  /* ===== 17 · FINAL → text | image ===== */
  #final-experience { grid-template-columns: 1fr 1fr; align-items: stretch; }
  .final__media { order: 0; min-height: 0; }
  .final__media::after { background: linear-gradient(90deg, var(--bg-main), transparent 40%); }
  .final__text { padding-block: clamp(40px, 6vh, 96px); padding-inline: var(--page-x); }
  .final__body { max-width: 52ch; }
}

/* =========================================================
   BAND 2 · Wide-only — iPad Pro 12.9" portrait (960–1024)
   3-column grids + Philosophy 2-col + tighter heading gap.
   ========================================================= */
@media (orientation: portrait) and (min-width: 960px) and (max-width: 1024px) {

  /* iPad Pro portrait rhythm pass.
     08's tall-canvas scale caps at 148/176px, which makes low-density blocks
     (especially the three MALEA pull-quotes) feel detached from the landing
     cadence. Bring the whole Pro portrait rhythm onto a tighter editorial step,
     then tune quotes as compact accent sections below. */
  :root {
    --vr-standard: clamp(72px, 6vh, 96px);
    --vr-dense:    clamp(40px, 4.2vh, 60px);
    --vr-generous: clamp(72px, 6vh, 96px);
  }

  /* Pull-quotes on iPad Pro portrait are editorial accents, not full sections.
     Keep them in the same cadence as surrounding sections, but use a tighter
     self-padding because the quote content itself is intentionally low-density. */
  .quote-screen {
    min-height: 0;
    padding-block: clamp(48px, 4.5vh, 64px);
  }
  .bigquote { max-width: min(86%, 760px); }
  .quote-screen--wide .bigquote { max-width: min(90%, 940px); }

  /* Last quote sits between Portfolio (which already has bottom padding) and the
     image-led Final. Use asymmetric padding so the visible air above and below
     reads balanced instead of creating a separate pause. */
  .quote-screen--wide {
    margin-block: 0;
    padding-top: clamp(18px, 2vh, 28px);
    padding-bottom: clamp(60px, 5.5vh, 80px);
  }

  /* ===== 04 · PHILOSOPHY → 2 columns (heading | text) ===== */
  #philosophy {
    display: block;
    min-height: 0;
    padding-block: var(--vr-standard);
  }
  #philosophy .philo__inner {
    padding-block: 0;
  }
  .philo__inner { grid-template-columns: 1.4fr 1fr; gap: clamp(40px, 6vw, 80px); padding-inline: 0; }
  .philo__heading { white-space: normal; text-align: left; }
  .philo__text p { max-width: 56ch; margin-inline: 0; }

  /* ===== 10 · MUSICIANS → 3 vertical cards ===== */
  .mus__grid { grid-template-columns: repeat(3, 1fr); max-width: none; margin-inline: 0; gap: clamp(24px, 3vw, 48px); }
  .mus__card { flex-direction: column; align-items: stretch; gap: 0; justify-content: flex-start; }
  .mus__photo { width: auto; aspect-ratio: 4/5; margin-bottom: var(--s-5); }
  .mus__info { flex: 0 1 auto; }
  .mus__name { font-size: clamp(19px, 2.1vw, 23px); }
  .mus__desc { max-width: none; }

  /* ===== 14 · INTEGRATION → 3 columns (subgrid panels) ===== */
  .fi-panels { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto auto 1fr auto; }
  .fi-panel {
    display: grid;
    grid-template-columns: none;
    grid-template-rows: subgrid;
    grid-row: span 4;
    column-gap: 0; row-gap: 0;
    padding: clamp(30px, 4vh, 52px) clamp(20px, 2.4vw, 36px) clamp(34px, 4.5vh, 60px);
    border-right: 1px solid var(--gold-line);
    border-bottom: none;
  }
  .fi-panel:last-child { border-right: none; border-bottom: none; }
  .fi-title { grid-column: auto; grid-row: auto; margin-bottom: var(--s-5); }
  .fi-rule  { grid-column: auto; grid-row: auto; display: block; }
  .fi-tag   { grid-column: auto; grid-row: auto; margin-top: var(--s-6); align-self: auto; width: auto; max-width: none; }
  .fi-desc  { grid-column: auto; grid-row: auto; align-self: auto; }

  /* ===== 15 · WHY → 3 columns ===== */
  .why__args { grid-template-columns: repeat(3, 1fr); }
  .why__arg {
    display: flex; flex-direction: column;
    grid-template-columns: none; column-gap: 0;
    align-items: stretch;
    border-right: 1px solid var(--gold-line); border-bottom: none;
  }
  .why__arg:last-child { border-right: none; border-bottom: none; }
  .why__arg h4 { grid-column: auto; grid-row: auto; min-height: 2.2em; margin-bottom: clamp(16px, 2.2vh, 26px); }
  .why__arg p  { grid-column: auto; grid-row: auto; }
}

/* =========================================================
   Reviews · 6th state ("Раскрытие телесности") shown ONLY on portrait
   phones + tablets (≤1024). Desktop & landscape keep 5 states so their
   composition (states in the right column) isn't broken.
   ========================================================= */
@media (orientation: portrait) and (max-width: 1024px) {
  .rev__states-list li.rev__state--xtra { display: grid; }
}


/* ===== 11-tablet-portrait-refine.css ===== */
/* =========================================================
   MALEA · 11 · Portrait tablets refine — iPad / Air / Pro 11"
   ---------------------------------------------------------
   Range: portrait, 761–959px (iPad 10.2 @810, iPad Air @820,
   iPad Pro 11" @834). This middle band kept the LOOSE 08 rhythm
   (130px section padding → 260px gaps, 94px heading→content) and
   full-height "statement" screens (Philosophy / quotes) that left
   huge voids on a tall portrait canvas.

   NOT covered here on purpose:
     · iPad mini (744) → already tightened by the mobile layer 09.
     · iPad Pro 12.9" portrait (≥960) → layer 10.
     · Phones (≤760) → layer 09.

   Loaded LAST. ►  TO ROLL BACK: remove this file's <link>.

   Applies (from the audit):
     A · Tighter, even vertical rhythm (section gaps & heading gaps)
     B · Philosophy + pull-quotes → normal flow (kills the voids)
     C · Centre the horizontal musician cards (no dead space right)
   ========================================================= */

@media (orientation: portrait) and (min-width: 761px) and (max-width: 959px) {

  /* ---------- A · Vertical rhythm ----------
     Was: --vr-standard 11vh→130 (260px between sections),
          --vr-dense 8vh→94 (heading→content),
          reviews on --vr-generous (153, out of step).
     Now: one tighter, consistent scale. */
  :root {
    --vr-standard: clamp(56px, 7vh, 84px);   /* section padding → ~80; gap 260 → ~160 */
    --vr-dense:    clamp(36px, 4.5vh, 56px);  /* heading → content → ~53 (was 94) */
    --vr-generous: clamp(56px, 7vh, 84px);    /* reviews onto the same rhythm */
  }

  /* ---------- B · Kill the full-height voids ----------
     On a tall portrait the 100svh statement / 70svh quote screens
     floated a tiny block in ~700px of emptiness. Make them flow. */
  #philosophy {
    display: block;
    min-height: 0;
    padding-block: var(--vr-standard);
  }
  #philosophy .philo__inner { padding-block: 0; }
  .quote-screen { min-height: 0; padding-block: clamp(48px, 6vh, 76px); }

  /* ---------- C · Centre the horizontal musician cards ----------
     The single-column horizontal cards left ~175px of dead space on
     the right. Tighten the column to the content width and centre it
     (08 already sets margin-inline:auto), and centre the card content. */
  .mus__grid { max-width: 660px; }
  .mus__card { justify-content: center; }

  /* ---------- E · Identity — match text height to the photo ----------
     Photo (aspect 4/5 in the 44% column) is ~370px tall; the
     title + sub + 4-item list ran ~506px, so the centred photo
     floated short beside a much taller text block. Keep the photo as
     is and COMPRESS the text vertically: tighten the gap under the
     subtitle and the per-row padding of the credentials list so the
     text column ≈ the photo height (both then centre cleanly). */
  #identity .identity__sub { margin-bottom: clamp(16px, 2.2vh, 22px); }
  #identity .identity__list li { padding-block: clamp(9px, 1.4vh, 11px); }

  /* ---------- F · Pull-quotes · Direction A (editorial accent) ----------
     Same treatment as the phone layer, scaled for the wider portrait canvas:
     a touch more size for presence, a tight byline that belongs to the quote,
     and a short gold rule above as an anchor. Larger portrait iPads inherit
     the same tablet quote principle from 08-tablet-portrait. */
  .bigquote__text { font-size: clamp(30px, 4vw, 34px); line-height: 1.24; font-weight: 300; letter-spacing: .015em; }
  .bigquote__attr { margin-top: clamp(16px, 2vh, 22px); letter-spacing: .2em; }
  .bigquote::before {
    content: "";
    display: block;
    width: 48px; height: 1px;
    margin: 0 auto clamp(24px, 3vh, 32px);
    background: var(--gold-soft);
  }
  /* Last quote (--wide): Portfolio above supplies its own padding-bottom while
     the image-led Final below has padding-top:0 → symmetric quote padding read
     as "pressed to the photo". Asymmetric padding (small top, larger bottom)
     evens the content-to-content air before/after. */
  .quote-screen--wide { margin-block: 0; padding-top: clamp(2px, 0.5vh, 10px); padding-bottom: clamp(76px, 9vh, 110px); }
}


/* ===== 09-mobile-refinements.css ===== */
/* =========================================================
   MALEA · 09 · Mobile refinements  —  PHONES ONLY (≤760px)
   ---------------------------------------------------------
   Also holds the .live__heading desktop/mobile visibility
   toggle (global, not inside the media query).
   ========================================================= */

/* ---------- Live heading: mobile vs desktop visibility ---------- */
/* The mobile heading (.live__heading--mobile) sits before .live__media
   in the DOM; the desktop heading stays inside .live-text-left.
   Only one is visible at a time — the other is display:none so
   IntersectionObserver and [data-reveal] are inert on the hidden copy. */
.live__heading--mobile { display: none; }   /* hidden on desktop */
.live__heading--desktop { display: block; }  /* shown on desktop */

/* =========================================================
   MALEA · 09 · Mobile refinements  —  PHONES ONLY (≤760px)
   ---------------------------------------------------------
   Self-contained mobile-only polish layer, loaded LAST so it
   wins purely by cascade order (no !important needed).

   ►  TO ROLL BACK: delete this file's <link> in index.html
      (or comment it out). Nothing else references it and no
      existing rule was edited — removing the link restores
      the previous mobile layout exactly.

   Scope is strictly max-width:760px. Desktop, landscape
   tablets (07) and portrait tablets (08) are NOT touched.

   Audit items applied (P1 + P2), mobile only:
     · Section headings → left-aligned, slightly smaller,
       looser leading (lighter multi-line headings)
     · Even vertical rhythm: #art / #reviews padding pulled
       onto the standard mobile value; pull-quote screens
       shortened (were a near-full empty screen each)
     · Formats: image & copy share one left edge (the running
       number becomes a kicker above the title)
     · Micro labels 10→11px; body 15→16px (readability)
   ========================================================= */

@media (max-width: 760px) {

  /* ---------- Type scale (token overrides, mobile only) ---------- */
  :root {
    /* was clamp(36px, 4.2vw, 60px) → 36 floor on every phone.
       Now ~31px at 390px, never larger than the old 36. */
    --fs-section: clamp(30px, 8vw, 36px);
    /* was clamp(10px, .78vw, 12px) → 10px floor — too small on phones */
    --fs-micro: 11px;
    /* Body was 16px (bare minimum → read "очень мелко"). 17px reads
       comfortably and keeps a clear step under the 19px gold subtitle.
       One token → all body text scales uniformly; grid/rhythm are px-based
       and unaffected. */
    --fs-body: 17px;
    /* Heading→content / media→text gap. Desktop token stays clamp(72,8vh,120)
       = 72px on phones — too airy. Tighten so headings sit with their content. */
    --vr-dense: clamp(30px, 4vh, 48px);
  }

  /* ---------- Section headings: left-aligned ---------- */
  /* Override the per-section centring so every section header shares
     one left edge with its body/list/cards on the narrow column. */
  #musicians .shead,
  #formats .shead,
  #why .shead,
  #portfolio .shead,
  .player__head,
  .egypt__header,
  .live__heading,
  .slots__head { text-align: left; }

  /* Looser leading so the 3–4 line headings breathe at the smaller size. */
  .shead__title,
  .slots__head,
  .player__heading,
  .live__heading,
  .final__heading,
  .egypt__header .heading,
  .philo__heading { line-height: 1.12; }

  /* ---------- Even, tighter vertical rhythm between sections ---------- */
  /* Phones were at 84px top+bottom → ~168px between sections (and #art/#reviews
     even escaped that via ID+token). Pull EVERY section onto one tighter value
     so the page reads as a continuous flow, not isolated screens with voids.
     ~51px each side → ~102px between sections (vs 168). */
  .pad-block,
  #art,
  #reviews,
  #philosophy { padding-block: clamp(44px, 6vh, 64px); }

  /* identity in the opening-deck gets --vr-standard (~100-180px) from
     13-opening-desktop.css → override to match the uniform mobile rhythm. */
  html.js-opening #opening >#identity.op-layer {
    padding-block: clamp(44px, 6vh, 64px);
  }

  /* Pull-quotes & Philosophy are LOW-DENSITY blocks (a one-line quote, a short
     statement). At the standard section padding their own air stacks with the
     neighbours' → ~100–120px around very little content = looks gigantic. Give
     them one shared, tighter padding so they sit inside the flow as an accent,
     not a floating block. (Both use --vr-block below.) */
  :root { --vr-block: clamp(20px, 3vh, 30px); }
  /* Quotes keep their original CENTRED Cormorant-italic look (left-aligned /
     enlarged read worse). They only needed breathing room: give them
     section-level padding so the last quote isn't jammed against the
     image-led "Создать опыт" section right below it. */
  .quote-screen { min-height: 0; padding-block: clamp(40px, 6vh, 56px); }

  /* ---------- Philosophy: normal-flow section, aligned to the margin ---------- */
  /* Was a 100svh full screen with ~400px of voids; on a scrolled phone that
     pause is just dead space. Drop the full height and let it flow.
     .philo__inner sits INSIDE .wrap yet also carried its own
     padding:var(--page-x) (content inset twice, ~56px). Zero the inner
     horizontal padding so heading/text line up at the standard 28px margin
     (the existing <br> then resolves the heading to a clean 2 lines), and
     give it the standard section rhythm via padding-block. */
  #philosophy { min-height: 0; }
  #philosophy .philo__inner { padding-inline: 0; padding-block: 0; }

  /* ---------- Reviews heading: tidy the wrap ---------- */
  /* The desktop hard break (музыка<br>и…) re-wraps on the narrow column
     into 4 ragged lines with single-word orphans. Drop the forced break
     on phones and let the browser balance it into clean lines. (The
     desktop <br> stays; a trailing space before it lets the words rejoin
     without gluing «музыка»+«и».) */
  #reviews .shead__title br { display: none; }
  #reviews .shead__title { text-wrap: balance; }

  /* ---------- Formats: image and copy share the left edge ---------- */
  /* Drop the hanging-number gutter (image was flush at the margin while
     the copy was indented ~56px). The number becomes a small kicker
     above the title, so image + number + copy all align at the margin. */
  #formats .fmt__line-content { grid-template-columns: 1fr; }
  #formats .fmt__line-num { padding-top: 0; margin-bottom: var(--s-2); }
  /* Tighten the card-to-card gap (was 42/42 → ~84px between cards). */
  .fmt__line { padding-block: clamp(22px, 3vw, 28px); }

  /* ---------- Final CTA: centre to match the other mobile buttons ---------- */
  #final-experience .final__text > div:last-child { text-align: center; }

  /* ---------- Live: kill the doubled gap before "Подходит для:" ---------- */
  /* Stacked, the inner grid already separates the lede from the formats
     block via its row-gap (~42px). The lede paragraph ALSO carried
     margin-bottom:var(--s-6) (48px), so the two stacked into ~90px of void
     and broke the rhythm. Zero the paragraph margin → only the row-gap
     remains as the separator. */
  #live .live__text { margin-bottom: 0; }

  /* ---------- Final: trim the oversized top image ~10% ----------
     The image-led Final screen used min-height:60vh → it dominated the phone.
     Pull it back ~10% (54vh). With object-position 50% 65% the crop lands
     mostly on the top, so the subject stays framed. */
  #final-experience .final__media { min-height: 46vh; }
  /* Kill the 1px "pixel line" at the photo's bottom edge.
     .final__media has a fractional height (46vh), so at dpr 2–3 its bottom
     edge lands on a half-device-pixel → the clipped bottom row renders
     semi-transparent. The fixed .site-atmosphere overlay (a blue radial
     pinned to the bottom of the viewport) showed THROUGH that translucent
     row as a faint, scroll-flickering seam ("просвечивается сквозь фон").
     Paint the section + media with the solid field colour so there is no
     transparency behind the edge for the atmosphere to bleed through.
     --bg-deep == the body field, so this is visually identical to the
     unified background — no new seam. */
  #final-experience { background: var(--bg-deep); }
  #final-experience .final__media { background: var(--bg-deep); }
  /* Raise the photo ~10% within the frame (show a slightly lower slice of the
     portrait): object-position Y 65% → 75%. Remove transform:scale() because
     it creates a GPU compositor layer that can leave a 1px sub-pixel seam
     against the ::after overlay at the bottom edge. Without scale, the photo
     fills exactly 100% of the container — same visual crop, no seam. */
  /* overflow must stay VISIBLE so .final__media::after can extend below the box
     (see the bottom-cap overlay in 05-screens.css). The img is sized inset:0 to
     the box, so nothing else overflows. */
  #final-experience .final__media { overflow: visible; }
  #final-experience .final__media img {
    object-position: 50% 75%;
    transform: none;
  }
  /* The text block kept the desktop 14vh (~118px) block padding → an ~111px
     void between the photo and the "Создать опыт" heading, out of step with the
     mobile rhythm. Pull it onto the standard mobile section padding. */
  #final-experience .final__text { padding-block: clamp(44px, 6vh, 64px); }

  /* ---------- Reviews: tighten the gap before the states list ---------- */
  /* When the states list drops below the lede (stacked), 05-screens gives it
     margin-top:var(--s-7) (72px) → an oversized jump before "Соединение с
     собой". Pull it onto the standard mobile dense gap so it reads in rhythm. */
  #reviews .rev__states { margin-top: var(--vr-dense); }

  /* ---------- Pull-quotes · Direction A (editorial accent) ----------
     On phones the quote fell to the 22px clamp floor (barely above the 17px
     body) and the byline sat 48px adrift, so the "moment" read as an orphan
     paragraph. Restore presence: larger quote, tight byline, and a short gold
     rule above as an anchor (the same gold-line language used elsewhere). */
  /* font-weight 300 = genuinely light Cormorant (now imported); a hair of
     positive tracking opens the italic serif up for a more couture, airy read. */
  .bigquote__text { font-size: 26px; line-height: 1.26; font-weight: 300; letter-spacing: .015em; }
  .bigquote__attr { margin-top: clamp(14px, 2vh, 18px); font-size: 17px; letter-spacing: .2em; }
  .bigquote::before {
    content: "";
    display: block;
    width: 40px; height: 1px;
    margin: 0 auto clamp(20px, 3vh, 26px);
    background: var(--gold-soft);
  }
